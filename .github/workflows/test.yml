name: Tests

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz xvfb
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Format code
      run: make format

    - name: Run fast tests (all Python versions)
      run: xvfb-run -a make test-fast
      env:
        DISPLAY: :99

    - name: Run unit, CLI, and GUI tests (Python 3.10, 3.11, 3.12)
      if: matrix.python-version != '3.13'
      run: xvfb-run -a bash -c "make test-unit && make test-cli && make test-gui"
      env:
        DISPLAY: :99

    - name: Run extended tests (Python 3.13)
      if: matrix.python-version == '3.13'
      run: xvfb-run -a bash -c "make test-unit && make test-cli && make test-gui && make test-integration && make test-e2e"
      env:
        DISPLAY: :99