services:
  # List uncloud services
  # uc services ls
  web:
    # Build an image from the Dockerfile in the current directory
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: hbat-web:latest
    environment:
      - HBAT_ENV=production
      - HBAT_HOST=0.0.0.0
      - HBAT_PORT=8080
      - HBAT_RELOAD=false
    volumes:
      - hbat-uploads:/app/uploads
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    x-ports:
      - hbat-web.abhishek-tiwari.com:8080/https

volumes:
  hbat-uploads:
    driver: local