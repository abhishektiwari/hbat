services:
  web:
    # Build an image from the Dockerfile in the current directory
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: hbat-web:latest
    environment:
      - HBAT_ENV=production
      - HBAT_HOST=0.0.0.0
      - HBAT_PORT=8080
    volumes:
      - hbat-uploads:/app/uploads
    restart: unless-stopped
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 30s
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    x-ports:
      - hbat-web.abhishek-tiwari.com:8080/https

volumes:
  hbat-uploads:
    driver: local