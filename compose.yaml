services:
  # List uncloud services
  # uc services ls
  web:
    # Build an image from the Dockerfile in the current directory
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: hbat-web:latest
    environment:
      - HBAT_ENV=production
      - HBAT_HOST=0.0.0.0
      - HBAT_PORT=8080
      - HBAT_RELOAD=false
    volumes:
      - hbat-uploads:/app/uploads
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    x-caddy: |
      hbat-web.abhishek-tiwari.com {
          reverse_proxy {{upstreams "web" 8080}} {
              import common_proxy
              transport http {
                  dial_timeout 10s
                  response_header_timeout 60s
                  read_timeout 600s
                  write_timeout 600s
              }
          }
          log
      }

volumes:
  hbat-uploads:
    driver: local